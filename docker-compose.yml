version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: jagoangkat
    restart: always
    environment:
      POSTGRES_USER: jagoangkat
      POSTGRES_PASSWORD: jagoangkat
      POSTGRES_DB: jagoangkat
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
